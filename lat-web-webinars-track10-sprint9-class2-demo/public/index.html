<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Blog Personal - Webinar Sprint 9</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header">
        <h1 class="header__title">Mi Blog Personal</h1>
      </header>

      <main class="content">
        <section class="profile">
          <div class="profile__avatar">👤</div>
          <div class="profile__info">
            <div class="profile__text">
              <h2 class="profile__name">Cargando...</h2>
              <p class="profile__username">Cargando...</p>
              <p class="profile__email">Cargando...</p>
            </div>
            <button
              type="button"
              class="profile__edit-button"
              aria-label="Editar perfil"
            >
              Editar Perfil
            </button>
          </div>
        </section>

        <section class="posts">
          <div class="posts__header">
            <h3 class="posts__title">Mis Posts</h3>
            <button
              type="button"
              class="profile__add-button"
              aria-label="Agregar post"
            >
              + Agregar Post
            </button>
          </div>
          <ul class="posts__list"></ul>
        </section>
      </main>
    </div>

    <!-- Popup Editar Perfil -->
    <div class="popup" id="edit-popup">
      <div class="popup__content">
        <button type="button" class="popup__close" aria-label="Cerrar">
          ×
        </button>
        <h3 class="popup__title">Editar Perfil</h3>
        <form class="popup__form" name="edit-profile" novalidate>
          <input
            id="profile-name"
            type="text"
            name="profile-name"
            class="popup__input"
            placeholder="Tu nombre"
            required
            minlength="2"
            maxlength="30"
          />
          <span class="popup__error" id="profile-name-error"></span>
          <input
            id="profile-username"
            type="text"
            name="profile-username"
            class="popup__input"
            placeholder="Tu nombre de usuario"
            required
            minlength="2"
            maxlength="30"
          />
          <span class="popup__error" id="profile-username-error"></span>
          <input
            id="profile-email"
            type="email"
            name="profile-email"
            class="popup__input"
            placeholder="Tu correo electrónico"
            required
            minlength="5"
            maxlength="50"
          />
          <span class="popup__error" id="profile-email-error"></span>
          <button type="submit" class="popup__button" disabled>
            Actualizar Perfil
          </button>
        </form>
      </div>
    </div>

    <!-- Popup Agregar Post -->
    <div class="popup" id="add-popup">
      <div class="popup__content">
        <button type="button" class="popup__close">×</button>
        <h3 class="popup__title">Nuevo Post</h3>
        <form class="popup__form" name="add-post" novalidate>
          <input
            id="post-title"
            type="text"
            name="post-title"
            class="popup__input"
            placeholder="Título"
            required
            minlength="2"
            maxlength="50"
          />
          <span class="popup__error" id="post-title-error"></span>

          <textarea
            id="post-body"
            name="post-body"
            class="popup__input"
            placeholder="¿Qué estás pensando?"
            required
            minlength="2"
          ></textarea>
          <span class="popup__error" id="post-body-error"></span>

          <button type="submit" class="popup__button" disabled>Publicar</button>
        </form>
      </div>
    </div>

    <!-- Template -->
    <template id="post-template">
      <li class="post">
        <div class="post__info">
          <h4 class="post__title"></h4>
          <p class="post__body"></p>
        </div>
      </li>
    </template>

    <!-- Inicialización -->
    <script type="module" src="index.js"></script>
  </body>
</html>
